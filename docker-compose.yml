name: logisticslink

services:
  postgres:
    image: postgres:16-alpine
    container_name: logisticslink-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: logisticslink
      POSTGRES_PASSWORD: logisticslink
      POSTGRES_DB: logisticslink
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U logisticslink -d logisticslink"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
    name: logisticslink_postgres-data
