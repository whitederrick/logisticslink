services:
  postgres:
    image: postgres:16-alpine
    container_name: forwardlink-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: forwardlink
      POSTGRES_PASSWORD: forwardlink
      POSTGRES_DB: forwardlink
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forwardlink -d forwardlink"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
